# The canonical cold-email flow (Clay-only sourcing per
# brain/decisions/2026-06-10-clay-is-the-lead-workbench.md).
# Leads come IN from Clay — an export CSV, or an in-session Clay MCP pull
# saved to CSV — with at least: email, name (or first_name), company.
# Every line is removable except the ledger check, which lives inside
# gmail.send, not here.
steps:
  - clarify.ask: {}
  - verify.check: {in: "{{leads_csv}}", out: verified.csv, concurrency: 20}
  - compose.render: {in: verified.csv, template: "{{skill_dir}}/template.md", out: outbox.csv, personalize: true}
  - test.smoke: {}
  - test.dryrun: {of: gmail.send, sample: 10, checks: "SKILL.md#acceptance-checks"}
  - canary.run: {of: gmail.send, count: 10, seeds: "{{seed_inboxes}}"}
  - gmail.send: {in: outbox.csv, from: "{{from_account}}", from_name: "{{from_name}}", cc: "{{cc}}", concurrency: 8}
  - report.write: {}
