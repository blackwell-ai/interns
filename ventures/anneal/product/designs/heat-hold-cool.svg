<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1100" role="img" aria-label="ANNEAL heat hold cool back print">
  <!-- Flagship back print. Single-color line art for DTG or screen print. Swap #1A1A1A for the garment's contrast ink. -->
  <rect width="900" height="1100" fill="none"/>
  <g fill="none" stroke="#1A1A1A" stroke-width="4">
    <!-- axes -->
    <line x1="150" y1="820" x2="780" y2="820"/>
    <line x1="150" y1="820" x2="150" y2="240"/>
    <!-- the anneal curve: ramp up, hold plateau, slow controlled cool -->
    <path d="M150 800 L300 360 L520 360 L780 720" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- hold plateau tick guides -->
    <line x1="300" y1="360" x2="300" y2="820" stroke-width="2" stroke-dasharray="6 10"/>
    <line x1="520" y1="360" x2="520" y2="820" stroke-width="2" stroke-dasharray="6 10"/>
  </g>
  <!-- phase labels -->
  <g font-family="'IBM Plex Mono',ui-monospace,monospace" fill="#1A1A1A" letter-spacing="4">
    <text x="200" y="870" font-size="26">HEAT</text>
    <text x="372" y="870" font-size="26">HOLD</text>
    <text x="600" y="870" font-size="26">COOL</text>
    <text x="95" y="250" font-size="20" transform="rotate(-90 95 250)">TEMPERATURE</text>
    <text x="430" y="905" font-size="20">TIME</text>
  </g>
  <!-- wordmark + line -->
  <g font-family="'Neue Haas Grotesk Display','Inter','Helvetica Neue',Arial,sans-serif" fill="#1A1A1A" text-anchor="middle">
    <text x="450" y="1010" font-size="76" font-weight="600" letter-spacing="22">ANNEAL</text>
    <text x="450" y="1058" font-size="22" letter-spacing="8" font-family="'IBM Plex Mono',ui-monospace,monospace">REFINED LIKE ONE</text>
  </g>
</svg>
