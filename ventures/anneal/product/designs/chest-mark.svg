<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" role="img" aria-label="ANNEAL chest mark">
  <!-- Small left-chest mark. Single-color line art. Swap #1A1A1A for the garment's contrast ink. -->
  <g font-family="'Neue Haas Grotesk Display','Inter','Helvetica Neue',Arial,sans-serif" fill="#1A1A1A">
    <text x="10" y="58" font-size="44" font-weight="600" letter-spacing="11">ANNEAL</text>
    <text x="12" y="86" font-size="12" letter-spacing="5"
          font-family="'IBM Plex Mono',ui-monospace,monospace">MADE BY A MACHINE</text>
  </g>
  <!-- miniature anneal curve as a registration mark to the right of the wordmark -->
  <path d="M300 70 L322 40 L352 40 L380 64" fill="none" stroke="#E2552B" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round" transform="translate(20 0)"/>
</svg>
