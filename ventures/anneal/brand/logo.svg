<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" role="img" aria-label="ANNEAL">
  <defs>
    <linearGradient id="anneal-heat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E2552B"/>
      <stop offset="55%" stop-color="#B85A47"/>
      <stop offset="100%" stop-color="#6A7682"/>
    </linearGradient>
  </defs>
  <rect width="640" height="180" fill="#F4F1EA"/>
  <!-- mark: heat-to-cool block -->
  <rect x="60" y="56" width="68" height="68" rx="8" fill="url(#anneal-heat)"/>
  <!-- wordmark -->
  <text x="160" y="112"
        font-family="'Neue Haas Grotesk Display','Inter','Helvetica Neue',Arial,sans-serif"
        font-size="64" font-weight="600" letter-spacing="16" fill="#1A1A1A">ANNEAL</text>
  <!-- machine-hand caption -->
  <text x="162" y="142"
        font-family="'IBM Plex Mono','Söhne Mono',ui-monospace,monospace"
        font-size="13" letter-spacing="6" fill="#6A7682">MADE BY A MACHINE</text>
</svg>
